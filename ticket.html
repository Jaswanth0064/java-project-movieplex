<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Movie Ticket</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#f2f2f2;

}

.ticket{

width:700px;

margin:50px auto;

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}

.header{

background:#dc3545;

color:white;

padding:25px;

}

.content{

padding:30px;

}

table{

width:100%;

}

td{

padding:10px;

}

.qr{

width:140px;

height:140px;

background:#ddd;

display:flex;

justify-content:center;

align-items:center;

font-size:14px;

}

button{

margin-top:30px;

}

</style>

</head>

<body>

<div class="ticket">

<div class="header">

<h2>🎬 MoviePlex e-Ticket</h2>

</div>

<div class="content">

<div class="row">

<div class="col-md-8">

<table>

<tr>

<td><b>Movie</b></td>

<td>Pushpa 2</td>

</tr>

<tr>

<td><b>Theatre</b></td>

<td>PVR Cinemas</td>

</tr>

<tr>

<td><b>Date</b></td>

<td>12 July 2026</td>

</tr>

<tr>

<td><b>Time</b></td>

<td>7:30 PM</td>

</tr>

<tr>

<td><b>Seats</b></td>

<td>A1 A2 A3</td>

</tr>

<tr>

<td><b>Amount</b></td>

<td>₹660</td>

</tr>

<tr>

<td><b>Booking ID</b></td>

<td>MPX874563</td>

</tr>

</table>

</div>

<div class="col-md-4 text-center">

<div class="qr">

QR CODE

</div>

</div>

</div>

<div class="text-center">

<button class="btn btn-success">

Download Ticket

</button>

<button class="btn btn-danger"

onclick="window.location='index.html'">

Back Home

</button>

</div>

</div>

</div>

</body>

</html>
