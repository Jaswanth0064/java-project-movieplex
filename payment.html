<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MoviePlex | Payment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body style="background:#f5f5f5;">

<nav class="navbar navbar-expand-lg bg-white shadow">

<div class="container">

<a class="navbar-brand fw-bold text-danger" href="index.html">

🎬 MoviePlex

</a>

</div>

</nav>

<div class="container mt-5">

<div class="row">

<!-- LEFT -->

<div class="col-lg-8">

<div class="card shadow p-4">

<h3 class="mb-4">

Payment Details

</h3>

<div class="mb-3">

<label class="form-label">

Full Name

</label>

<input type="text"
class="form-control"
placeholder="Enter your name">

</div>

<div class="mb-3">

<label class="form-label">

UPI ID

</label>

<input type="text"
class="form-control"
placeholder="example@upi">

</div>

<div class="mb-3">

<label class="form-label">

Payment Method

</label>

<select class="form-select">

<option>UPI</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>Net Banking</option>

</select>

</div>

<button
class="btn btn-danger btn-lg w-100"
onclick="payNow()">

Pay Now

</button>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-4">

<div class="card shadow p-4">

<h4>

Booking Summary

</h4>

<hr>

<p>

<b>Movie :</b>

<span id="movie"></span>

</p>

<p>

<b>Theatre :</b>

<span id="theatre"></span>

</p>

<p>

<b>Show Time :</b>

<span id="time"></span>

</p>

<p>

<b>Seats :</b>

<span id="seat"></span>

</p>

<hr>

<h3>

₹ <span id="amount"></span>

</h3>

</div>

</div>

</div>

</div>

<script>

document.getElementById("movie").innerHTML =
localStorage.getItem("movie") || "Pushpa 2";

document.getElementById("theatre").innerHTML =
localStorage.getItem("theatre") || "PVR Cinemas";

document.getElementById("time").innerHTML =
localStorage.getItem("showTime") || "7:30 PM";

document.getElementById("seat").innerHTML =
localStorage.getItem("seats") || "A1,A2";

document.getElementById("amount").innerHTML =
localStorage.getItem("total") || "440";

function payNow(){

alert("Payment Successful ✅");

window.location.href="ticket.html";

}

</script>

</body>

</html>
