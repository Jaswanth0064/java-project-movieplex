<div class="container">


<h2 class="page-title">
Login
</h2>



<div class="row justify-content-center">


<div class="col-md-5">


<div class="form-box">


<form id="loginForm">


<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control"
required>

</div>



<div class="mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>



<button
id="loginBtn"
class="btn btn-red w-100"
type="submit">

Login

</button>


</form>



<p class="mt-3 text-center">

Don't have an account?

<a href="register.html">

Register

</a>

</p>


</div>


</div>


</div>
